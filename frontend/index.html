<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwen3.5-9B Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #7c6af7;
      --accent-hover: #9585ff;
      --user-bg: #1e1b3a;
      --assistant-bg: #1a1a1a;
      --danger: #e05555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    header .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    .dot.online { background: #4caf82; }
    .dot.error  { background: var(--danger); }

    header .actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-icon:hover { color: var(--text); border-color: #444; }

    /* Settings bar */
    #settings-bar {
      display: none;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      background: var(--surface);
      font-size: 13px;
    }
    #settings-bar.open { display: flex; }

    #settings-bar label { color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    #settings-bar input[type="text"],
    #settings-bar input[type="number"],
    #settings-bar textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 13px;
    }
    #settings-bar input[type="text"]  { width: 200px; }
    #settings-bar input[type="number"]{ width: 70px; }
    #settings-bar textarea { width: 100%; min-height: 60px; resize: vertical; font-family: inherit; margin-top: 6px; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 780px;
      width: 100%;
    }
    .msg.user    { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }
    .msg.system  { align-self: center; align-items: center; }

    .msg-role {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 100%;
    }
    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid #2e2a55;
      border-radius: 12px 12px 2px 12px;
    }
    .msg.assistant .msg-bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-radius: 12px 12px 12px 2px;
    }
    .msg.system .msg-bubble {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
    }

    /* Thinking block */
    .thinking-block {
      margin-bottom: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-size: 13px;
      max-width: 100%;
    }
    .thinking-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--surface);
      cursor: pointer;
      user-select: none;
      color: var(--text-muted);
    }
    .thinking-header .arrow { transition: transform 0.2s; }
    .thinking-block.collapsed .arrow { transform: rotate(-90deg); }
    .thinking-body {
      padding: 8px 12px;
      white-space: pre-wrap;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      line-height: 1.5;
    }
    .thinking-block.collapsed .thinking-body { display: none; }

    /* Cursor blink */
    .cursor::after {
      content: "▋";
      animation: blink 0.8s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Input area */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #user-input:focus { outline: none; border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 0 18px;
      height: 44px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #stop-btn {
      display: none;
      background: var(--danger);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 0 18px;
      height: 44px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
    }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>Qwen3.5-9B</h1>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Connecting...</span>
  </div>
  <div class="actions">
    <button class="btn-icon" id="settings-toggle">Settings</button>
    <button class="btn-icon" id="clear-btn">Clear</button>
  </div>
</header>

<div id="settings-bar">
  <label>API URL <input type="text" id="api-url" value="http://localhost:8000" /></label>
  <label>Model <input type="text" id="model-name" value="qwen" /></label>
  <label>Max tokens <input type="number" id="max-tokens" value="2048" min="64" max="8192" /></label>
  <label>Temperature <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1" /></label>
  <label style="flex-direction:column;align-items:flex-start;width:100%;">
    System prompt
    <textarea id="system-prompt">You are a helpful assistant.</textarea>
  </label>
</div>

<div id="messages">
  <div class="msg system">
    <div class="msg-bubble">Start chatting below. Thinking blocks are collapsed by default.</div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="user-input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button id="send-btn">&#8593;</button>
    <button id="stop-btn">Stop</button>
  </div>
  <div class="hint">Shift+Enter for newline</div>
</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const stopBtn     = document.getElementById('stop-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const settingsToggle = document.getElementById('settings-toggle');
  const settingsBar    = document.getElementById('settings-bar');

  let history = [];
  let abortController = null;

  // --- Settings toggle ---
  settingsToggle.addEventListener('click', () => settingsBar.classList.toggle('open'));

  // --- Health check ---
  async function checkHealth() {
    const base = document.getElementById('api-url').value.trim();
    try {
      const r = await fetch(`${base}/health`, { signal: AbortSignal.timeout(3000) });
      if (r.ok) { setStatus('online', 'Online'); } else { setStatus('error', 'Server error'); }
    } catch { setStatus('error', 'Offline'); }
  }

  function setStatus(state, label) {
    statusDot.className = `dot ${state}`;
    statusText.textContent = label;
  }

  checkHealth();
  setInterval(checkHealth, 10000);

  // --- Auto-resize textarea ---
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // --- Send on Enter ---
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);
  stopBtn.addEventListener('click', () => abortController?.abort());
  clearBtn.addEventListener('click', () => {
    history = [];
    messagesEl.innerHTML = '<div class="msg system"><div class="msg-bubble">Conversation cleared.</div></div>';
  });

  // --- Render helpers ---
  function appendMessage(role, content = '') {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const roleLabel = document.createElement('div');
    roleLabel.className = 'msg-role';
    roleLabel.textContent = role === 'user' ? 'You' : 'Qwen';
    wrap.appendChild(roleLabel);

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    wrap.appendChild(bubble);

    messagesEl.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Parse <think>...</think> blocks from streamed content
  function renderContent(bubble, text, streaming) {
    bubble.innerHTML = '';

    // Split out think blocks
    const parts = text.split(/(<think>[\s\S]*?<\/think>|<think>[\s\S]*$)/);

    for (const part of parts) {
      if (part.startsWith('<think>')) {
        const inner = part.replace(/^<think>/, '').replace(/<\/think>$/, '');
        const block = document.createElement('div');
        block.className = 'thinking-block collapsed';

        const header = document.createElement('div');
        header.className = 'thinking-header';
        header.innerHTML = '<span class="arrow">▼</span> Thinking';
        header.addEventListener('click', () => block.classList.toggle('collapsed'));

        const body = document.createElement('div');
        body.className = 'thinking-body';
        body.textContent = inner;

        block.appendChild(header);
        block.appendChild(body);
        bubble.appendChild(block);
      } else if (part) {
        const span = document.createElement('span');
        span.textContent = part;
        if (streaming && part === parts[parts.length - 1]) span.className = 'cursor';
        bubble.appendChild(span);
      }
    }
  }

  // --- Main send ---
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || abortController) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Add to history and UI
    history.push({ role: 'user', content: text });
    appendMessage('user', text).textContent = text;

    const bubble = appendMessage('assistant');
    bubble.classList.add('cursor');

    sendBtn.style.display = 'none';
    stopBtn.style.display = 'inline-block';
    inputEl.disabled = true;

    abortController = new AbortController();

    const base       = document.getElementById('api-url').value.trim();
    const model      = document.getElementById('model-name').value.trim();
    const maxTokens  = parseInt(document.getElementById('max-tokens').value);
    const temperature = parseFloat(document.getElementById('temperature').value);
    const systemPrompt = document.getElementById('system-prompt').value.trim();

    const messages = systemPrompt
      ? [{ role: 'system', content: systemPrompt }, ...history]
      : [...history];

    let fullText = '';

    try {
      const res = await fetch(`${base}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: abortController.signal,
        body: JSON.stringify({
          model,
          messages,
          stream: true,
          max_tokens: maxTokens,
          temperature,
        }),
      });

      if (!res.ok) {
        const err = await res.text();
        bubble.textContent = `Error ${res.status}: ${err}`;
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          const trimmed = line.trim();
          if (!trimmed || trimmed === 'data: [DONE]') continue;
          if (!trimmed.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(trimmed.slice(6));
            const delta = data.choices?.[0]?.delta?.content;
            if (delta) { fullText += delta; renderContent(bubble, fullText, true); scrollBottom(); }
          } catch { /* skip malformed */ }
        }
      }
    } catch (e) {
      if (e.name !== 'AbortError') {
        bubble.textContent = `Request failed: ${e.message}`;
      }
    } finally {
      // Remove cursor
      renderContent(bubble, fullText, false);
      bubble.classList.remove('cursor');

      if (fullText) history.push({ role: 'assistant', content: fullText });

      abortController = null;
      sendBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
      inputEl.disabled = false;
      inputEl.focus();
      scrollBottom();
    }
  }
</script>
</body>
</html>
