<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwen3.5-9B Chat</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Qwen3.5-9B</h1>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text"></span>
  </div>
  <div class="actions">
    <select id="lang-select" title="Language / 語言 / 言語">
      <option value="en">EN</option>
      <option value="zh-TW">繁中</option>
      <option value="zh-CN">简中</option>
      <option value="ja">日本語</option>
    </select>
    <button class="btn-icon btn-think" id="think-btn"      data-i18n="thinkOff"></button>
    <button class="btn-icon"          id="export-btn"     data-i18n="export"></button>
    <button class="btn-icon"          id="settings-toggle" data-i18n="settings"></button>
    <button class="btn-icon"          id="clear-btn"       data-i18n="clear"></button>
  </div>
</header>

<div id="settings-bar">
  <label><span data-i18n="apiServer"></span>   <input type="text"   id="api-url"     value="http://192.168.80.60:8000" /></label>
  <label><span data-i18n="model"></span>        <input type="text"   id="model-name"  value="qwen" /></label>
  <label><span data-i18n="maxTokens"></span>    <input type="number" id="max-tokens"  value="6144" min="64" max="8192" /></label>
  <label><span data-i18n="temperature"></span>  <input type="number" id="temperature" value="0.1"  min="0"  max="2" step="0.1" /></label>
  <label style="flex-direction:column;align-items:flex-start;width:100%;">
    <span data-i18n="systemPrompt"></span>
    <textarea id="system-prompt">You are a helpful assistant with web search and web fetch tools.
RULES:
- For any question about current events, news, prices, or facts that may have changed, you MUST call web_search FIRST before answering.
- Never answer from memory when the information could be outdated.
- After searching, cite the source URL in your answer.</textarea>
  </label>
  <button id="reset-settings-btn" data-i18n="resetSettings" style="margin-left:auto;"></button>
</div>

<div id="messages">
  <div class="msg system">
    <div class="msg-bubble" data-i18n="welcome"></div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="user-input" rows="1"></textarea>
    <button id="send-btn">&#8593;</button>
    <button id="stop-btn" data-i18n="stop"></button>
  </div>
  <div id="fetch-status"></div>
  <div class="hint" data-i18n="hint"></div>
</div>

<script type="module" src="js/chat.js"></script>
</body>
</html>
